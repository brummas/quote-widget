<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Widget Advanced</title>
    <link href="https://fonts.googleapis.com/css2?family=Mystery+Quest&family=Flavors&family=Cabin+Sketch:wght@400;700&family=Griffy&family=Bonbon&family=Special+Elite&family=IM+Fell+DW+Pica+SC&family=Rubik+Glitch&family=Rubik+Burned&family=Jacquarda+Bastarda+9+Charted&family=Jacquarda+12+Charted&family=Jacquarda+Bastarda+9&family=Playfair+Display:ital@1&family=Dancing+Script:wght@600&family=Poppins:wght@300;400&family=Caveat:wght@500&family=Courier+Prime&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container 100% flexível para se ajustar ao bloco do Notion */
        .widget-container {
            background-color: #FFF0F5; /* Rosa Pastel */
            border: 1px outset #b0b0b0; /* Borda Outset de 1px cinza (efeito sombra) */
            border-radius: 16px;
            padding: 15px; 
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.03);
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        /* Ícone no topo direito */
        .icon-menu {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }

        .icon-btn svg {
            fill: #FFB6C1; /* Estrela Rosa Pastel */
            width: 18px;
            height: 18px;
        }

        .icon-btn:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        /* Área de exibição do texto (Flexível e Responsiva) */
        .quote-display {
            color: #4A3E3D;
            font-size: 22px; /* Tamanho inicial padronizado */
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: normal;
            word-wrap: break-word;
            white-space: pre-wrap;
            width: 100%;
            padding: 10px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        /* Painel de Configurações Completo */
        .settings-panel {
            display: none; /* Escondido por padrão */
            background-color: #FFE4E1;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #FFB6C1;
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 85%;
            overflow-y: auto;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.2s ease-in-out;
        }

        .settings-panel input[type="text"] {
            width: 100%;
            border: 1px solid #FFB6C1;
            border-radius: 6px;
            padding: 6px;
            font-size: 13px;
            outline: none;
        }

        .settings-row {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .settings-panel select, .settings-panel input[type="color"] {
            background-color: #fff;
            border: 1px solid #FFB6C1;
            border-radius: 6px;
            padding: 5px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            flex-grow: 1;
        }
        
        .settings-panel input[type="color"] {
            padding: 2px;
            height: 28px;
            max-width: 50px;
            flex-grow: 0;
        }

        .style-btn-group {
            display: flex;
            gap: 4px;
        }

        .style-btn {
            background-color: #fff;
            border: 1px solid #FFB6C1;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #4A3E3D;
        }

        .style-btn.active {
            background-color: #FFB6C1;
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="icon-menu">
            <button class="icon-btn" onclick="togglePanel(event)" title="Configurações">
                <svg viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
            </button>
        </div>

        <div class="quote-display" id="text-output">"Seu quote lindo e estético aqui."</div>

        <div class="settings-panel" id="settings" onclick="event.stopPropagation()">
            <input type="text" id="text-input" placeholder="Digite a nova frase..." oninput="updateText(this.value)">
            
            <div class="settings-row">
                <select id="font-select" onchange="changeFont(this.value)">
                    <option value="'Playfair Display', serif">Playfair Display</option>
                    <option value="'Mystery Quest', cursive">Mystery Quest</option>
                    <option value="'Flavors', cursive">Flavors</option>
                    <option value="'Cabin Sketch', cursive">Cabin Sketch</option>
                    <option value="'Griffy', cursive">Griffy</option>
                    <option value="'Bonbon', cursive">Bonbon</option>
                    <option value="'Special Elite', monospace">Special Elite</option>
                    <option value="'IM Fell DW Pica SC', serif">IM Fell DW Pica SC</option>
                    <option value="'Rubik Glitch', system-ui">Rubik Glitch</option>
                    <option value="'Rubik Burned', system-ui">Rubik Burned</option>
                    <option value="'Jacquarda Bastarda 9 Charted', serif">Jacquarda Bastarda 9 Charted</option>
                    <option value="'Jacquarda 12 Charted', serif">Jacquarda 12 Charted</option>
                    <option value="'Jacquarda Bastarda 9', serif">Jacquarda Bastarda 9</option>
                    <option value="'Courier Prime', monospace">Courier Prime</option>
                    <option value="'Dancing Script', cursive">Dancing Script</option>
                    <option value="'Caveat', cursive">Caveat</option>
                    <option value="'Poppins', sans-serif">Poppins</option>
                </select>

                <select id="size-select" onchange="changeSize(this.value)" style="max-width: 80px;">
                    <option value="14px">14px</option>
                    <option value="16px">16px</option>
                    <option value="18px">18px</option>
                    <option value="20px">20px</option>
                    <option value="22px" selected>22px</option>
                    <option value="26px">26px</option>
                    <option value="32px">32px</option>
                    <option value="38px">38px</option>
                    <option value="46px">46px</option>
                </select>
                
                <input type="color" id="color-input" value="#4A3E3D" onchange="changeColor(this.value)" title="Cor da Fonte">
            </div>

            <div class="settings-row" style="margin-top: 2px;">
                <span style="font-size: 11px; color: #5c4d4c;">Estilo do Texto:</span>
                <div class="style-btn-group">
                    <button class="style-btn" id="btn-bold" onclick="toggleBold()">B</button>
                    <button class="style-btn" id="btn-italic" onclick="toggleItalic()">I</button>
                    <button class="style-btn" id="btn-normal" onclick="setNormal()">Normal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const panel = document.getElementById('settings');
        const textInput = document.getElementById('text-input');
        const textOutput = document.getElementById('text-output');
        
        let isBold = false;
        let isItalic = true; 

        textInput.value = textOutput.innerText.replace(/"/g, "");

        function togglePanel(event) {
            event.stopPropagation();
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'flex';
                textInput.focus();
            }
        }

        function updateText(val) {
            textOutput.innerText = val ? `"${val}"` : "";
        }

        function changeFont(fontName) {
            textOutput.style.fontFamily = fontName;
        }

        function changeSize(fontSize) {
            textOutput.style.fontSize = fontSize;
        }

        function changeColor(color) {
            textOutput.style.color = color;
        }

        function toggleBold() {
            isBold = !isBold;
            textOutput.style.fontWeight = isBold ? 'bold' : 'normal';
            document.getElementById('btn-bold').classList.toggle('active', isBold);
            if(isBold) document.getElementById('btn-normal').classList.remove('active');
        }

        function toggleItalic() {
            isItalic = !isItalic;
            textOutput.style.fontStyle = isItalic ? 'italic' : 'normal';
            document.getElementById('btn-italic').classList.toggle('active', isItalic);
            if(isItalic) document.getElementById('btn-normal').classList.remove('active');
        }

        function setNormal() {
            isBold = false;
            isItalic = false;
            textOutput.style.fontWeight = 'normal';
            textOutput.style.fontStyle = 'normal';
            document.getElementById('btn-bold').classList.remove('active');
            document.getElementById('btn-italic').classList.remove('active');
            document.getElementById('btn-normal').classList.add('active');
        }

        document.addEventListener('click', function(event) {
            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            }
        });
    </script>
</body>
</html>
